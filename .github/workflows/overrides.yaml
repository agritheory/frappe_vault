name: Track Overrides

on:
  pull_request:
    branches:
      - version-15
      - version-16
      - version-16

jobs:
  track_overrides:
    runs-on: ubuntu-latest
    name: Track Overrides
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Track Overrides
        uses: agritheory/test_utils/actions/track_overrides@main
        with:
          app: frappe_vault
          base-branch: version-15
