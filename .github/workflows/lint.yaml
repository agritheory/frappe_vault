name: Linters

on:
  push:
    branches:
      - version-15
      - version-16
  pull_request:
    branches:
      - version-15
      - version-16

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path
          errors = []
          for f in Path("./frappe_vault/frappe_vault/").rglob("*.json"):
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          EOF

      - name: Compile
        run: python3 -m compileall -q ./

      - name: Check merge conflicts
        run: |
          if grep -lr --exclude-dir=node_modules "^<<<<<<< " "${GITHUB_WORKSPACE}"; then
            echo "Found merge conflicts"
            exit 1
          fi

  mypy:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install mypy
        run: pip install mypy

      - name: Install mypy stubs
        run: mypy ./frappe_vault/. --install-types --non-interactive

      - name: Run mypy
        run: mypy ./frappe_vault/.

  black:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Black (Frappe)
        run: pip install git+https://github.com/frappe/black.git

      - name: Run Black
        run: black --check .

  prettier:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Prettier
        run: npx --yes prettier@3.1.0 --check --config ./.prettierrc.cjs --ignore-path ./.prettierignore "**/*.js"

  json_diff:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 2

      - name: Find JSON changes
        id: changed-json
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.json
          include_all_old_new_renamed_files: true

      - name: Copy head paths files
        run: |
          mkdir head
          touch head/acmr.txt
          for file in ${{ steps.changed-json.outputs.added_files }}; do
            echo "A,head/${file}" >> head/acmr.txt
            cp --parents $file head/
          done
          for file in ${{ steps.changed-json.outputs.copied_files }}; do
            echo "C,head/${file}" >> head/acmr.txt
            cp --parents $file head/
          done
          for file in ${{ steps.changed-json.outputs.modified_files }}; do
            echo "M,head/${file}" >> head/acmr.txt
            cp --parents $file head/
          done
          for file in ${{ steps.changed-json.outputs.renamed_files }}; do
            echo "R,head/${file}" >> head/acmr.txt
            cp --parents $file head/
          done

      - name: Checkout base
        run: git checkout $(git --no-pager log --oneline -n 2 | awk 'NR==2 {print $1}')

      - name: Copy base paths
        run: |
          mkdir base
          touch base/mrd.txt
          for file in ${{ steps.changed-json.outputs.modified_files }}; do
            echo "M,${file}" >> base/mrd.txt
          done
          for file in ${{ steps.changed-json.outputs.all_old_new_renamed_files }}; do
            echo "R,${file}" >> base/mrd.txt
          done
          for file in ${{ steps.changed-json.outputs.deleted_files }}; do
            echo "D,${file}" >> base/mrd.txt
          done
