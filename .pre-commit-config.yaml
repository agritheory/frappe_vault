exclude: 'node_modules|.git'
default_stages: [pre-commit]
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '.*json$|.*txt$|.*csv|.*md|.*svg'
      - id: check-yaml
      - id: no-commit-to-branch
        args: ['--branch', 'version-15', '--branch', 'version-16']
      - id: check-merge-conflict
      - id: check-ast
      - id: check-json
      - id: check-toml
      - id: debug-statements

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--ignore-words-list", "notin"]
        exclude: 'yarn.lock|poetry.lock'
        additional_dependencies:
          - tomli

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade
        args: ['--py310-plus']

  - repo: https://github.com/agritheory/black
    rev: 951ccf4d5bb0d692b457a5ebc4215d755618eb68
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/flake8
    rev: 7.2.0
    hooks:
      - id: flake8
        additional_dependencies: ['flake8-bugbear']

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-strict-optional']
        additional_dependencies: ['types-requests']

  - repo: https://github.com/agritheory/test_utils
    rev: v1.20.2
    hooks:
      - id: update_pre_commit_config
      - id: validate_frappe_project
      - id: validate_copyright
        files: '\.(js|ts|py|md)$'
        args: ['--app', 'frappe_vault']
      - id: bylines
        exclude: 'README.md|CHANGELOG.md'
      - id: clean_customized_doctypes
        args: ['--app', 'frappe_vault']
      - id: validate_customizations
        args: ['--app', 'frappe_vault']
      - id: validate_patches
        args: ['--app', 'frappe_vault']
      - id: track_overrides
        args: ['--directory', '.', '--app', 'frappe_vault', '--base-branch', 'version-15']
      - id: check_code_duplication
        args: ['--max-clones', '60', '--max-percentage', '5.0']

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript]
        exclude: |
          (?x)^(
            .*node_modules.*|
            frappe_vault/public/dist/.*|
            frappe_vault/public/js/lib/.*|
            frappe_vault/templates/includes/.*
          )$

ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
